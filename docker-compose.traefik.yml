# =============================================================================
# SonarQube — Production Stack (Traefik Reverse Proxy)
# =============================================================================
# Usage:  docker compose -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   - Traefik v2/v3 reverse proxy running on the ${PROXY_NETWORK} network, with
#     `web` (:80) + `web-secure` (:443) entrypoints and a `letsencrypt` resolver.
#   - DNS record pointing at this server:
#       ${SONARQUBE_HOSTNAME}  → SonarQube web UI / API
#   - Host kernel: vm.max_map_count=524288 is applied by the privileged
#     `sonarqube-init` service on every start (see that service below).
#
# Architecture:
#   Browsers / Scanners / CI
#         │
#         ▼   (HTTPS, Let's Encrypt)
#    ┌─────────┐
#    │ Traefik │ — proxy network (external)
#    └────┬────┘
#         │
#    ┌────▼──────────────────────────────┐
#    │ sonarqube ── db (PostgreSQL)       │ — local network
#    └────────────────────────────────────┘
#
# Notes:
#   - SonarQube embeds Elasticsearch → needs vm.max_map_count + high ulimits.
#   - The Community Branch Plugin is baked into the wrapper image; do NOT mount
#     a volume over /opt/sonarqube/extensions (it would shadow the plugin).
# =============================================================================


### Service Templates ###

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"


services:

  # ── Kernel tuning (privileged, one-shot) ───────────────────────────────────
  # SonarQube's embedded Elasticsearch refuses to start unless the HOST kernel
  # has vm.max_map_count >= 524288. That sysctl is NOT namespaced, so it cannot
  # be set per-container via `sysctls:` — a short-lived privileged container is
  # the portable way to apply it. The value persists on the host after exit;
  # `sonarqube` waits for this to complete before starting.
  sonarqube-init:
    image: ${SONARQUBE_INIT_IMAGE:-busybox}:${SONARQUBE_INIT_VERSION:-stable}
    container_name: ${STACK_NAME:-sonarqube}_INIT
    restart: "no"
    privileged: true
    command: sh -c "sysctl -w vm.max_map_count=524288 && sysctl -w fs.file-max=131072"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    network_mode: none


  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Plain postgres (no pgvector). Tuning baseline: 4 GB host RAM, SSD/NVMe.
  # See .env.example for the 8 GB / 16 GB scale-up presets.
  db:
    image: ${POSTGRES_IMAGE:-postgres}:${POSTGRES_VERSION:-16-alpine}
    container_name: ${STACK_NAME:-sonarqube}_DB
    hostname: db
    restart: unless-stopped
    <<: *logging
    command: >
      -c max_connections=${PG_MAX_CONNECTIONS:-100}
      -c shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      -c work_mem=${PG_WORK_MEM:-8MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1536MB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      -c max_wal_size=${PG_MAX_WAL_SIZE:-1GB}
      -c min_wal_size=${PG_MIN_WAL_SIZE:-256MB}
      -c random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      -c seq_page_cost=1.0
      -c effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      PGTZ: ${TIME_ZONE:-Etc/UTC}
      POSTGRES_USER: ${POSTGRES_USER:-sonar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sonar}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - 5432/tcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonar} -d ${POSTGRES_DB:-sonar}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      local:


  # ── SonarQube (wrapper image: Community Build + Branch Plugin) ──────────────
  sonarqube:
    image: ${SONARQUBE_IMAGE:-ghcr.io/bauer-group/XPD-SonarQube/sonarqube}:${SONARQUBE_VERSION:-latest}
    container_name: ${STACK_NAME:-sonarqube}_APP
    hostname: sonarqube
    restart: unless-stopped
    <<: *logging
    depends_on:
      db:
        condition: service_healthy
      sonarqube-init:
        condition: service_completed_successfully
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      # Database
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-sonar}
      SONAR_JDBC_USERNAME: ${POSTGRES_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # Public base URL → correct links in notifications & PR decoration
      SONAR_CORE_SERVERBASEURL: ${SONARQUBE_SERVER_BASE_URL:-https://${SONARQUBE_HOSTNAME}}
      # JVM heap (the branch-plugin -javaagent opts are baked into the image)
      SONAR_WEB_JAVAOPTS: ${SONAR_WEB_JAVAOPTS:--Xmx512m -Xms128m}
      SONAR_CE_JAVAOPTS: ${SONAR_CE_JAVAOPTS:--Xmx512m -Xms128m}
      SONAR_SEARCH_JAVAOPTS: ${SONAR_SEARCH_JAVAOPTS:--Xmx512m -Xms512m -XX:MaxDirectMemorySize=256m}
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 8192
        hard: 8192
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      # NB: /opt/sonarqube/extensions is intentionally NOT a volume — plugins
      # are baked into the wrapper image. A volume here would shadow the branch
      # plugin after an image upgrade (see src/sonarqube/Dockerfile).
    expose:
      - 9000/tcp
    healthcheck:
      # curl is present in the upstream image (eclipse-temurin base). Match on
      # "status":"UP" — /api/system/status returns 200 while still STARTING.
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status 2>/dev/null | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 120s
    networks:
      local:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-EDGEPROXY}"

      # ── Shared HTTP→HTTPS redirect middleware ─────────────────────────────
      - "traefik.http.middlewares.${STACK_NAME:-sonarqube}-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${STACK_NAME:-sonarqube}-redirect.redirectscheme.permanent=true"

      # ── SonarQube ─ HTTP (redirect) ───────────────────────────────────────
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app-http.rule=Host(`${SONARQUBE_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app-http.entrypoints=web"
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app-http.middlewares=${STACK_NAME:-sonarqube}-redirect"

      # ── SonarQube ─ HTTPS ─────────────────────────────────────────────────
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app.rule=Host(`${SONARQUBE_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app.entrypoints=web-secure"
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app.tls=true"
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${STACK_NAME:-sonarqube}-app.service=${STACK_NAME:-sonarqube}-app"
      - "traefik.http.services.${STACK_NAME:-sonarqube}-app.loadBalancer.server.port=9000"


  # ── Backup Sidecar (optional) ──────────────────────────────────────────────
  # Activate with: docker compose -f docker-compose.traefik.yml --profile backup up -d
  # On-demand:     docker compose -f docker-compose.traefik.yml --profile backup run --rm sonarqube-backup --now
  # Dumps the SonarQube PostgreSQL database. Internal-only — no Traefik exposure.
  sonarqube-backup:
    image: ${SONARQUBE_BACKUP_IMAGE:-ghcr.io/bauer-group/XPD-SonarQube/sonarqube-backup}:${SONARQUBE_BACKUP_VERSION:-latest}
    container_name: ${STACK_NAME:-sonarqube}_BACKUP
    profiles: ["backup"]
    restart: unless-stopped
    <<: *logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      INSTANCE_NAME: ${SONARQUBE_BACKUP_INSTANCE_NAME:-${STACK_NAME:-sonarqube}}

      # Source: PostgreSQL
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sonar}
      DB_USER: ${POSTGRES_USER:-sonar}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_SSLMODE: disable

      # Dump + retention
      DUMP_FORMAT: ${SONARQUBE_BACKUP_DUMP_FORMAT:-custom}
      DUMP_TIMEOUT_SECONDS: ${SONARQUBE_BACKUP_DUMP_TIMEOUT_SECONDS:-1800}
      RETENTION_COUNT: ${SONARQUBE_BACKUP_RETENTION_COUNT:-14}
      KEEP_LOCAL_ARCHIVE: ${SONARQUBE_BACKUP_KEEP_LOCAL_ARCHIVE:-true}
      BACKUP_DIR: /data

      # Schedule
      SCHEDULE_ENABLED: ${SONARQUBE_BACKUP_SCHEDULE_ENABLED:-true}
      SCHEDULE_MODE: ${SONARQUBE_BACKUP_SCHEDULE_MODE:-cron}
      SCHEDULE_CRON: ${SONARQUBE_BACKUP_SCHEDULE_CRON:-15 3 * * *}
      SCHEDULE_INTERVAL_HOURS: ${SONARQUBE_BACKUP_SCHEDULE_INTERVAL_HOURS:-24}
      RUN_ON_STARTUP: ${SONARQUBE_BACKUP_ON_STARTUP:-false}

      # Optional off-site S3 target (empty endpoint → local-only)
      S3_ENDPOINT: ${SONARQUBE_BACKUP_S3_ENDPOINT:-}
      S3_BUCKET: ${SONARQUBE_BACKUP_S3_BUCKET:-}
      S3_ACCESS_KEY: ${SONARQUBE_BACKUP_S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${SONARQUBE_BACKUP_S3_SECRET_KEY:-}
      S3_REGION: ${SONARQUBE_BACKUP_S3_REGION:-eu-central-1}
      S3_PREFIX: ${SONARQUBE_BACKUP_S3_PREFIX:-sonarqube/}
      S3_MAX_WORKERS: ${SONARQUBE_BACKUP_S3_MAX_WORKERS:-4}

      # Alerting
      ALERT_ENABLED: ${SONARQUBE_BACKUP_ALERT_ENABLED:-false}
      ALERT_LEVEL: ${SONARQUBE_BACKUP_ALERT_LEVEL:-warnings}
      ALERT_CHANNELS: ${SONARQUBE_BACKUP_ALERT_CHANNELS:-}
      ALERT_EMAIL: ${SONARQUBE_BACKUP_ALERT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-starttls}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM_EMAIL:-}
      WEBHOOK_URL: ${SONARQUBE_BACKUP_WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${SONARQUBE_BACKUP_WEBHOOK_SECRET:-}
      TEAMS_WEBHOOK_URL: ${SONARQUBE_BACKUP_TEAMS_WEBHOOK:-}

      # Logging
      LOG_LEVEL: ${SONARQUBE_BACKUP_LOG_LEVEL:-INFO}
      LOG_FORMAT: ${SONARQUBE_BACKUP_LOG_FORMAT:-console}
    volumes:
      - sonarqube-backup-data:/data
    networks:
      local:


### Volumes ###
volumes:
  postgres-data:
    driver: local
    name: ${STACK_NAME:-sonarqube}-postgres
  sonarqube-data:
    driver: local
    name: ${STACK_NAME:-sonarqube}-data
  sonarqube-logs:
    driver: local
    name: ${STACK_NAME:-sonarqube}-logs
  sonarqube-backup-data:
    driver: local
    name: ${STACK_NAME:-sonarqube}-backup


### Networks ###
networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-sonarqube}
    enable_ipv6: true

  proxy:
    name: ${PROXY_NETWORK:-EDGEPROXY}
    external: true
