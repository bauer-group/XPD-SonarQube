# =============================================================================
# Dependabot Configuration
# =============================================================================
# Watches:
#   1. GitHub Actions versions (workflows pinned to @main pull module updates)
#   2. Image references inside docker-compose*.yml files
#   3. Base images inside the two Dockerfiles
#   4. Python deps of the backup sidecar
#
# Pure digest drift on existing floating tags is handled by check-base-images.yml
# (daily cron). The SonarQube ↔ branch-plugin version pair is bumped manually
# (see docs/upgrade.md) — Dependabot does not track the GitHub-release JAR.
# =============================================================================

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
      - "dependabot"
    commit-message:
      prefix: "chore(ci)"

  # Docker Compose images (postgres, busybox, the wrapper images)
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "dependabot"
    commit-message:
      prefix: "chore(deps)"

  # sonarqube wrapper base image (sonarqube:<ver>-community in src/sonarqube/Dockerfile)
  - package-ecosystem: "docker"
    directory: "/src/sonarqube"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "dependabot"
    commit-message:
      prefix: "chore(docker)"

  # sonarqube-backup base image (python:*-alpine in src/sonarqube-backup/Dockerfile)
  - package-ecosystem: "docker"
    directory: "/src/sonarqube-backup"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "dependabot"
    commit-message:
      prefix: "chore(docker)"

  # sonarqube-backup Python deps (requirements.txt + requirements-test.txt)
  - package-ecosystem: "pip"
    directory: "/src/sonarqube-backup"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "python"
      - "dependabot"
    commit-message:
      prefix: "chore(deps)"
