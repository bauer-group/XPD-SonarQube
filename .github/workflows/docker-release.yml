name: 🚀 Release & Docker Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - '.env.example'
  workflow_dispatch:
    inputs:
      force-release:
        description: 'force create release'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  security-events: write

# Serialize release runs on a branch so concurrent runs never race on the
# semantic-release git push (the "rejected push loop"). Queue, never cancel —
# an in-flight publish must finish.
concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================
  # Validation Jobs
  # ============================================

  validate-compose:
    name: 🔍 Validate Docker Compose
    uses: bauer-group/automation-templates/.github/workflows/modules-validate-compose.yml@main
    with:
      compose-files: '["docker-compose.coolify.yml", "docker-compose.traefik.yml", "docker-compose.development.yml"]'
      env-file: '.env.example'
      validate-services: '["postgres", "sonarqube"]'

  validate-scripts:
    name: 🔍 Validate Shell Scripts
    uses: bauer-group/automation-templates/.github/workflows/modules-validate-shellscript.yml@main
    with:
      scan-directory: '.'
      severity: 'error'

  # ============================================
  # Resolve the newest plugin-compatible SonarQube version
  # ============================================
  # The Community Branch Plugin is version-locked to SonarQube, and the floating
  # `community` tag often runs ahead of the plugin's releases. So we float on the
  # PLUGIN: take its latest release, then pick the newest matching SonarQube
  # `<MAJOR.MINOR>.*-community` tag and pass it as a build-arg. This keeps the
  # build green and always on the newest WORKING pair — no manual pinning.

  resolve-versions:
    name: 🧭 Resolve & pin SonarQube + plugin pair
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      build-args: ${{ steps.r.outputs.build-args }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - id: r
        shell: bash
        env:
          # Pass context values through the environment — never interpolate
          # ${{ github.* }} into the script body (GitHub Actions script injection).
          REF: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # Defense-in-depth: refuse an unexpected ref name before using it.
          case "$REF" in
            *[!A-Za-z0-9._/-]*) echo "::error::unexpected ref name: $REF"; exit 1 ;;
          esac
          plugin="$(curl -fsSL https://api.github.com/repos/mc1arke/sonarqube-community-branch-plugin/releases/latest | jq -r '.tag_name')"
          minor="$(printf '%s' "$plugin" | cut -d. -f1-2)"
          sq="$(curl -fsSL "https://hub.docker.com/v2/repositories/library/sonarqube/tags?page_size=100&name=${minor}." \
                | jq -r '.results[].name' \
                | grep -E "^${minor}\.[0-9.]+-community$" | sort -V | tail -1)"
          if [ -z "$plugin" ] || [ -z "$sq" ]; then
            echo "::error::could not resolve a SonarQube tag for plugin ${plugin:-<none>} (minor ${minor:-<none>})"
            exit 1
          fi
          echo "Resolved pair: SonarQube=${sq}  branch-plugin=${plugin}"

          # The build still receives the pair as build-args (the build job checks
          # out the trigger commit, before the commit-back below lands).
          # docker/build-push-action expects newline-separated KEY=VALUE pairs.
          {
            echo "build-args<<__ARGS__"
            echo "SONARQUBE_VERSION=${sq}"
            echo "BRANCH_PLUGIN_VERSION=${plugin}"
            echo "__ARGS__"
          } >> "$GITHUB_OUTPUT"

          # ── Commit the resolved pair BACK into the Dockerfile ARGs ──────────
          # Keeps the Dockerfile the single source of truth: published == file.
          # Skipped on PRs. GITHUB_TOKEN pushes do NOT re-trigger workflows, so
          # this never loops; the rebase-retry guards against a concurrent push.
          if [ "$EVENT_NAME" = "pull_request" ]; then exit 0; fi
          df="src/sonarqube/Dockerfile"
          sed -i -E "s|^(ARG SONARQUBE_VERSION=).*|\1${sq}|" "$df"
          sed -i -E "s|^(ARG BRANCH_PLUGIN_VERSION=).*|\1${plugin}|" "$df"
          if git diff --quiet -- "$df"; then
            echo "Dockerfile already at the resolved pair — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$df"
          git commit -m "chore: pinned SonarQube ${sq} + branch-plugin ${plugin} [skip ci]"
          for attempt in 1 2 3; do
            if git push; then echo "pushed"; break; fi
            echo "push rejected — rebasing (attempt ${attempt})…"
            git pull --rebase --autostash origin "$REF"
            sleep 3
          done

  # ============================================
  # Release Job (only on main branch push)
  # ============================================

  release:
    name: 📦 Create Semantic Release
    needs: [validate-compose, validate-scripts]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.validate-compose.result == 'success' &&
      needs.validate-scripts.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/modules-semantic-release.yml@main
    with:
      target-branch: 'main'
      dry-run: false
      force-release: ${{ inputs.force-release || false }}
    secrets: inherit

  # ============================================
  # Docker Build & Push (sonarqube wrapper image)
  # ============================================
  # SonarQube Community Build + Community Branch Plugin baked in.
  # Version pinning lives in src/sonarqube/Dockerfile ARG defaults.

  docker-build-sonarqube-release:
    name: 🐳 Build & Push sonarqube
    needs: [release, resolve-versions]
    if: needs.release.outputs.release-created == 'true'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      deploy-environment: 'production'
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube'

      release-version: ${{ needs.release.outputs.version }}
      image-tags: 'stable'

      update-dockerfile-version: true
      auto-tags: true
      latest-tag: true

      dockerfile-path: './src/sonarqube/Dockerfile'
      docker-context: './src/sonarqube'
      platforms: 'linux/amd64'
      build-args: ${{ needs.resolve-versions.outputs.build-args }}

      push: true

      security-scan: false
      security-fail-on: 'CRITICAL'
      generate-sbom: true
      sync-dockerhub-readme: false
    secrets: inherit

  docker-build-sonarqube-pr:
    name: 🔨 Validate sonarqube Build (PR)
    needs: [validate-compose, validate-scripts, resolve-versions]
    if: |
      github.event_name == 'pull_request' &&
      needs.validate-compose.result == 'success' &&
      needs.validate-scripts.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube'

      auto-tags: true
      dockerfile-path: './src/sonarqube/Dockerfile'
      docker-context: './src/sonarqube'
      platforms: 'linux/amd64'
      build-args: ${{ needs.resolve-versions.outputs.build-args }}

      push: false

      security-scan: false
      security-fail-on: 'CRITICAL'
    secrets: inherit

  # ============================================
  # Docker Build & Push (sonarqube-backup image)
  # ============================================

  docker-build-backup-release:
    name: 🐳 Build & Push sonarqube-backup
    needs: release
    if: needs.release.outputs.release-created == 'true'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      deploy-environment: 'production'
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube-backup'

      release-version: ${{ needs.release.outputs.version }}
      image-tags: 'stable'

      update-dockerfile-version: true
      auto-tags: true
      latest-tag: true

      dockerfile-path: './src/sonarqube-backup/Dockerfile'
      docker-context: './src/sonarqube-backup'
      platforms: 'linux/amd64'

      push: true

      security-scan: false
      security-fail-on: 'CRITICAL'
      generate-sbom: true
      sync-dockerhub-readme: false
    secrets: inherit

  docker-build-backup-pr:
    name: 🔨 Validate sonarqube-backup Build (PR)
    needs: [validate-compose, validate-scripts]
    if: |
      github.event_name == 'pull_request' &&
      needs.validate-compose.result == 'success' &&
      needs.validate-scripts.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube-backup'

      auto-tags: true
      dockerfile-path: './src/sonarqube-backup/Dockerfile'
      docker-context: './src/sonarqube-backup'
      platforms: 'linux/amd64'

      push: false

      security-scan: false
      security-fail-on: 'CRITICAL'
    secrets: inherit
