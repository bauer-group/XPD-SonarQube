name: 🚀 Release & Docker Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - '.env.example'
  workflow_dispatch:
    inputs:
      force-release:
        description: 'force create release'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  security-events: write

jobs:
  # ============================================
  # Validation Jobs
  # ============================================

  validate-compose:
    name: 🔍 Validate Docker Compose
    uses: bauer-group/automation-templates/.github/workflows/modules-validate-compose.yml@main
    with:
      compose-files: '["docker-compose.coolify.yml", "docker-compose.traefik.yml", "docker-compose.development.yml"]'
      env-file: '.env.example'
      validate-services: '["postgres", "sonarqube"]'

  validate-scripts:
    name: 🔍 Validate Shell Scripts
    uses: bauer-group/automation-templates/.github/workflows/modules-validate-shellscript.yml@main
    with:
      scan-directory: '.'
      severity: 'error'

  # ============================================
  # Resolve the newest plugin-compatible SonarQube version
  # ============================================
  # The Community Branch Plugin is version-locked to SonarQube, and the floating
  # `community` tag often runs ahead of the plugin's releases. So we float on the
  # PLUGIN: take its latest release, then pick the newest matching SonarQube
  # `<MAJOR.MINOR>.*-community` tag and pass it as a build-arg. This keeps the
  # build green and always on the newest WORKING pair — no manual pinning.

  resolve-versions:
    name: 🧭 Resolve SonarQube + plugin pair
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      build-args: ${{ steps.r.outputs.build-args }}
    steps:
      - id: r
        shell: bash
        run: |
          set -euo pipefail
          plugin="$(curl -fsSL https://api.github.com/repos/mc1arke/sonarqube-community-branch-plugin/releases/latest | jq -r '.tag_name')"
          minor="$(printf '%s' "$plugin" | cut -d. -f1-2)"
          sq="$(curl -fsSL "https://hub.docker.com/v2/repositories/library/sonarqube/tags?page_size=100&name=${minor}." \
                | jq -r '.results[].name' \
                | grep -E "^${minor}\.[0-9.]+-community$" | sort -V | tail -1)"
          if [ -z "$plugin" ] || [ -z "$sq" ]; then
            echo "::error::could not resolve a SonarQube tag for plugin ${plugin:-<none>} (minor ${minor:-<none>})"
            exit 1
          fi
          echo "Resolved: SonarQube=${sq}  (latest plugin ${plugin})"
          # docker/build-push-action expects newline-separated KEY=VALUE pairs,
          # NOT JSON — one arg here.
          echo "build-args=SONARQUBE_VERSION=${sq}" >> "$GITHUB_OUTPUT"

  # ============================================
  # Release Job (only on main branch push)
  # ============================================

  release:
    name: 📦 Create Semantic Release
    needs: [validate-compose, validate-scripts]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.validate-compose.result == 'success' &&
      needs.validate-scripts.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/modules-semantic-release.yml@main
    with:
      target-branch: 'main'
      dry-run: false
      force-release: ${{ inputs.force-release || false }}
    secrets: inherit

  # ============================================
  # Docker Build & Push (sonarqube wrapper image)
  # ============================================
  # SonarQube Community Build + Community Branch Plugin baked in.
  # Version pinning lives in src/sonarqube/Dockerfile ARG defaults.

  docker-build-sonarqube-release:
    name: 🐳 Build & Push sonarqube
    needs: [release, resolve-versions]
    if: needs.release.outputs.release-created == 'true'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      deploy-environment: 'production'
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube'

      release-version: ${{ needs.release.outputs.version }}
      image-tags: 'stable'

      update-dockerfile-version: false
      auto-tags: true
      latest-tag: true

      dockerfile-path: './src/sonarqube/Dockerfile'
      docker-context: './src/sonarqube'
      platforms: 'linux/amd64'
      build-args: ${{ needs.resolve-versions.outputs.build-args }}

      push: true

      security-scan: false
      security-fail-on: 'CRITICAL'
      generate-sbom: true
      sync-dockerhub-readme: false
    secrets: inherit

  docker-build-sonarqube-pr:
    name: 🔨 Validate sonarqube Build (PR)
    needs: [validate-compose, validate-scripts, resolve-versions]
    if: |
      github.event_name == 'pull_request' &&
      needs.validate-compose.result == 'success' &&
      needs.validate-scripts.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube'

      auto-tags: true
      dockerfile-path: './src/sonarqube/Dockerfile'
      docker-context: './src/sonarqube'
      platforms: 'linux/amd64'
      build-args: ${{ needs.resolve-versions.outputs.build-args }}

      push: false

      security-scan: false
      security-fail-on: 'CRITICAL'
    secrets: inherit

  # ============================================
  # Docker Build & Push (sonarqube-backup image)
  # ============================================

  docker-build-backup-release:
    name: 🐳 Build & Push sonarqube-backup
    needs: release
    if: needs.release.outputs.release-created == 'true'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      deploy-environment: 'production'
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube-backup'

      release-version: ${{ needs.release.outputs.version }}
      image-tags: 'stable'

      update-dockerfile-version: false
      auto-tags: true
      latest-tag: true

      dockerfile-path: './src/sonarqube-backup/Dockerfile'
      docker-context: './src/sonarqube-backup'
      platforms: 'linux/amd64'

      push: true

      security-scan: false
      security-fail-on: 'CRITICAL'
      generate-sbom: true
      sync-dockerhub-readme: false
    secrets: inherit

  docker-build-backup-pr:
    name: 🔨 Validate sonarqube-backup Build (PR)
    needs: [validate-compose, validate-scripts]
    if: |
      github.event_name == 'pull_request' &&
      needs.validate-compose.result == 'success' &&
      needs.validate-scripts.result == 'success'
    uses: bauer-group/automation-templates/.github/workflows/docker-build.yml@main
    with:
      publish-to: 'ghcr'
      ghcr-image-name: 'bauer-group/XPD-SonarQube/sonarqube-backup'

      auto-tags: true
      dockerfile-path: './src/sonarqube-backup/Dockerfile'
      docker-context: './src/sonarqube-backup'
      platforms: 'linux/amd64'

      push: false

      security-scan: false
      security-fail-on: 'CRITICAL'
    secrets: inherit
