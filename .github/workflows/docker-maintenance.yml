# =============================================================================
# Dependabot Maintenance — Auto-merge ALL Dependabot PRs
# =============================================================================
# Auto-approves and squash-merges every Dependabot PR once its checks pass —
# base-image bumps (Dockerfiles), Python deps (requirements*.txt), GitHub Action
# versions and docker-compose image tags alike. Hands-off currency: dependency
# PRs are never left sitting open. The reusable gates on required checks, so a
# bump that breaks CI will not merge.
# =============================================================================

name: 🔧 Dependabot Maintenance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    name: Auto-merge Dependabot PRs
    uses: bauer-group/automation-templates/.github/workflows/docker-maintenance-dependabot.yml@main
    with:
      merge-method: 'squash'
      auto-approve: true
    secrets: inherit
