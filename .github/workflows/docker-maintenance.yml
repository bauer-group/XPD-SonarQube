# =============================================================================
# Docker Maintenance — Auto-merge Dependabot PRs (sonarqube-* Dockerfiles)
# =============================================================================
# When Dependabot opens a PR bumping a base image inside either:
#   - src/sonarqube/Dockerfile          (sonarqube:<ver>-community)
#   - src/sonarqube-backup/Dockerfile   (python:*-alpine)
# this workflow auto-approves and merges it (after validation passes), which
# then triggers docker-release.yml to build and push the updated image.
# =============================================================================

name: 🔧 Docker Maintenance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/sonarqube/Dockerfile'
      - 'src/sonarqube-backup/Dockerfile'

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    name: Auto-merge Dependabot PRs
    uses: bauer-group/automation-templates/.github/workflows/docker-maintenance-dependabot.yml@main
    with:
      merge-method: 'squash'
      auto-approve: true
    secrets: inherit
