# SonarQube project for the XPD-SonarQube stack repository.
# The only application code here is the Python backup sidecar plus the env
# generator script; everything else is Docker / Compose / CI / docs.
sonar.projectKey=bauer-group_xpd-sonarqube
sonar.projectName=XPD-SonarQube
sonar.sources=src/sonarqube-backup/src,scripts
sonar.tests=src/sonarqube-backup/tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.14

# Exclude build artefacts / caches
sonar.exclusions=**/__pycache__/**,**/*.pyc

# Coverage is OFF here (Level A — analysis only) to stay on the reusable
# workflow without a hand-rolled test job. To add coverage, switch to Level B
# (see docs/ci-integration.md) and uncomment:
# sonar.python.coverage.reportPaths=src/sonarqube-backup/coverage.xml
